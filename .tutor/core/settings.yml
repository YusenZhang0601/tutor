# 导师系统设置
# 所有可调参数集中于此，技能与 protocol 读取这里的值。

scheduler: sm2            # 复习算法：sm2（当前）；以后数据足够可换 fsrs

mastery:
  # 标记 mastered 的门禁条件（需同时满足）
  min_successful_reps: 3  # 连续成功复习次数
  min_interval_days: 21   # interval 需达到的天数
  promote_quality: 4      # 单次复习算"成功"的最低质量分（SM-2 的 0–5）

sm2:
  initial_ef: 2.5         # 初始 easiness factor
  min_ef: 1.3             # ef 下限
  first_interval: 1       # 首次通过后间隔（天）
  second_interval: 6      # 第二次通过后间隔（天）

review:
  target_retention: 0.90  # 目标留存率（FSRS 启用后用于计算 due）
  max_new_per_session: 3  # 每会话最多引入的新概念数（防过载）
  interleave: true        # ≥2 概念时跨主题交错复习

lapse:
  # 到期复习失败（质量分 < 3）时的退化策略
  reset_interval: 1       # interval 重置为 1 天
  ef_penalty: 0.20        # ef 扣减
